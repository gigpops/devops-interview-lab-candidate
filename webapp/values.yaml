replicaCount: 1

image:
  repository: nginx
  tag: 1.27-alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Values injected as a ConfigMap -> mounted as index.html
welcome:
  title: "Hello from Helm"
  message: "Welcome, {{ .Release.Name }}!"
