apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  FEATURE_FLAGS: {{ .Values.config.featureFlags | quote }}
